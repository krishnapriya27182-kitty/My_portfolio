[build]
  base = "frontend"
  publish = "dist"
  command = "npm install && npm run build"

[functions]
  directory = "../netlify/functions"

[[redirects]]
  from = "/api/projects"
  to = "/.netlify/functions/projects"
  status = 200

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
